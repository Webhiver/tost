<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f8f9fa" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PicoThermostat">
    <meta name="description" content="Smart thermostat control app for Pico W">
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg">
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg">
    <title>PicoThermostat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <script>
      // Prevent flash of wrong theme - runs before React
      (function() {
        var stored = localStorage.getItem('pico-thermostat-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'dark' || (stored !== 'light' && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.getElementById('theme-color-meta').content = '#050507';
        }
      })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
